<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p {
            font-family: Roboto, Arial;
            margin-top: 0;
            margin-bottom: 0;
        }

        .video-preview {
            display: inline-block;
            width: 300px;
            margin-right: 15px;
            vertical-align: top;
        }

        /* .below-thumbnail{
            vertical-align: top;
        } */

        .thumbnail {
            width: 100%;
        }

        .channel-picture {
            display: inline-block;
            width: 50px;
            vertical-align: top;
        }

        .video-info {
            display: inline-block;
            width: 200px;
        }

        .profile-picture {
            /* it will take up entire space of the container  */
            width: 40px;
            border-radius: 50px;
        }

        .video-title {
            margin-top: 0;
            font-size: 14px;

            /* regular -> 400 */
            /* medium -> 500 */
            /* high -> 700 */
            font-weight: 500;
            line-height: 14px;
            margin-bottom: 12px;
        }

        .video-author,
        .video-stats {
            font-size: 12px;
            color: rgb(96, 96, 96);

        }

        .video-author {
            margin-bottom: 4px;
        }

        .thumbnail-row {
            margin-bottom: 12px;
        }

        /* 
        .video-stats {
            font-size: 12px;
            color: rgb(96, 96, 96);
        } */
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bitcount+Grid+Double+Ink:wght@100..900&family=Bitcount+Single:wght@100..900&family=Bungee&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik+Storm&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- nes ted layouts  -->
    <!-- horizontal layout  -->
    <!-- vertical layouts  -->

    <div class="video-preview">

        <div class="thumbnail-row">
            <img class="thumbnail" src="images/thumbnail-1.webp" alt="">
        </div>

        <div class="below-thumbnail">
            <div class="channel-picture">
                <img class="profile-picture" src="images/channel-pic/channel-1.jpeg" alt="">
            </div>
            <div class="video-info">
                <p class="video-title">
                    Dont Laugh
                </p>

                <p class="video-author">
                    Ansh
                </p>

                <p class="video-stats">
                    19M views &#183; 4 years ago
                </p>
            </div>

        </div>
    </div>

    <div class="video-preview">
        <div class="thumbnail-row">
            <img class="thumbnail" src="images/thumbnail-2.webp">
        </div>
        <div>
            <div class="channel-picture">
                <img class="profile-picture" src="images/channel-pic/channel-2.jpeg">
            </div>
            <div class="video-info">
                <p class="video-title">
                    Try Not To Laugh Challenge #9
                </p>
                <p class="video-author">
                    Markiplier
                </p>
                <p class="video-stats">
                    19M views &#183; 4 years ago
                </p>
            </div>
        </div>
    </div>



    </div>
</body>

</html>
